services:

  nginx1:
    image: nginx:latest
    ports:
      - "8081:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro

  nginx2:
    image: nginx:latest
    ports:
      - "8082:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro

  apache:
    image: httpd:latest
    ports:
      - "8083:80"
    volumes:
      - ./index.html:/usr/local/apache2/htdocs/index.html:ro
